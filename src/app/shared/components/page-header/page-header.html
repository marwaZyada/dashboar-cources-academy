<div class="d-flex justify-content-between align-items-center mb-5">

  <div>
    <h2>{{ title() }}</h2>
    <p  style="color: #6b7280;
font-size: 15px;">
      {{ subtitle() }}
    </p>
  </div>

<button
  class="add-btn"
  mat-raised-button
  color="primary"
  (click)="addClicked.emit()">

  <mat-icon>add</mat-icon>

  <span class="btn-text">
    Add {{ name() }}
  </span>

</button>
</div>
