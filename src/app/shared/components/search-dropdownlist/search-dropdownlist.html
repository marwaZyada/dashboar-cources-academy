<mat-form-field  appearance="outline"
  class="filter-field">

  <mat-label>{{ label() }}</mat-label>

  <mat-select
    [(ngModel)]="selected"
    (selectionChange)="onSelectionChange($event.value)">

   

    @for (option of options(); track option.label) {

      <mat-option [value]="option.value">
        {{ option.label }}
      </mat-option>

    }

  </mat-select>

</mat-form-field>
