<div class="dashboard">

  <div class="header">
    <div>
      <h2>Dashboard</h2>
      <p>Welcome back, Admin 👋</p>
    </div>

    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      New Course
    </button>
  </div>

  <!-- Statistics -->
  <div class="stats-grid">

    <app-state-card
      title="Students"
      value="1,250"
      icon="groups"
      color="#3f51b5">
    </app-state-card>

    <app-state-card
      title="Courses"
      value="56"
      icon="school"
      color="#4caf50">
    </app-state-card>

    <app-state-card
      title="Revenue"
      value="$24K"
      icon="payments"
      color="#ff9800">
    </app-state-card>

    <app-state-card
      title="Instructors"
      value="18"
      icon="person"
      color="#e91e63">
    </app-state-card>

  </div>

  <!-- Content -->

  <div class="content-grid">

    <mat-card class="table-card">

      <mat-card-title>
        Recent Courses
      </mat-card-title>

      <table>

        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Students</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let course of courses">
            <td>{{course.name}}</td>
            <td>{{course.category}}</td>
            <td>{{course.students}}</td>
          </tr>

        </tbody>

      </table>

    </mat-card>

    <mat-card class="activity-card">

      <mat-card-title>
        Activity
      </mat-card-title>

      <div class="activity">

        <div class="item" *ngFor="let item of activities">

          <mat-icon>check_circle</mat-icon>

          <span>{{item}}</span>

        </div>

      </div>

    </mat-card>

  </div>

</div>
